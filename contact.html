<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Rayan</title>
    <style>
        body {
            background-color: #5905f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        .logo {
            font-size: 2rem;
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
            transition: 0.5s ease;
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
        }
        .logo:hover {
            color: #e0e0e0;
        }
        .container {
            background-color: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #ffffff;
            margin-bottom: 20px;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .info {
            background-color: #5905f7;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            transition: background-color 0.3s ease-in-out;
        }
        .info:hover {
            background-color: #4304b5;
        }
        a {
            color: white;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo">Rayan</a>
    <div class="container">
        <h2>Contact Me</h2>
        <div class="contact-info">
            <div class="info">📧 Email: rayangrgy@gmail.com</div>
            <div class="info">🎮 Discord: gr_gy</div>
            <div class="info">🔗 <a href="https://www.linkedin.com/in/rayan-gr-47663734a/" target="_blank">LinkedIn</a></div>
            <div class="info">🐦 <a href="https://x.com/RayanAnimeLover" target="_blank">X (Twitter)</a></div>
            <div class="info">💻 <a href="https://github.com/Remory-coder" target="_blank">GitHub</a></div>
            <div class="info">📸 <a href="https://www.instagram.com/rayann_gorji/" target="_blank">Instagram</a></div>

        </div>
    </div>
</body>
</html>
